name: docker-image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push GHCR image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute image name
        id: image
        shell: bash
        run: |
          REPO_NAME="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          OWNER_NAME="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${OWNER_NAME}/${REPO_NAME}" >> "$GITHUB_OUTPUT"

      - name: Compute build metadata
        id: meta_build
        shell: bash
        run: |
          APP_VERSION="$(git describe --tags --abbrev=0 2>/dev/null || echo 'dev')"
          BUILD_TIME="$(TZ='Asia/Shanghai' date +'%F %T %z')"
          GIT_COMMIT="$(git rev-parse --short HEAD)"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"
          echo "git_commit=${GIT_COMMIT}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            APP_VERSION=${{ steps.meta_build.outputs.app_version }}
            GITHUB_REPO=https://github.com/${{ github.repository }}
            BUILD_TIME=${{ steps.meta_build.outputs.build_time }}
            GIT_COMMIT=${{ steps.meta_build.outputs.git_commit }}
            APP_AUTHOR=xiaotecn
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
